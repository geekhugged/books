    insight: 'Negotiation is not about logic or compromise — it is about understanding and redirecting the other side\'s emotional state. The best negotiators don\'t split the difference; they change the game entirely.',
    chapters: [
      { n:'Intro', t:'The New Rules',
        s:'Former FBI lead hostage negotiator Chris Voss argues that the rational-actor model of negotiation (Harvard\'s Getting to Yes) ignores the overwhelming role of emotion and irrationality. Real-world high-stakes negotiation — kidnappings, hostage crises, terrorist demands — proved that empathy, calibrated questions, and emotional intelligence outperform logic every time.',
        k:'Negotiation is emotional, not rational — treat it accordingly and you gain an enormous edge.' },
      { n:'Ch 1', t:'Be a Mirror',
        s:'Mirroring — repeating the last one to three words the other person said, with a slightly upward inflection — is one of the simplest and most powerful rapport-building tools. It signals that you are listening, invites the other person to elaborate, and creates a sense of being understood without requiring you to reveal your own position or agenda.',
        k:'Repeat the last 3 words. It costs nothing and builds instant rapport.' },
      { n:'Ch 2', t:'Don\'t Feel Their Pain, Label It',
        s:'Tactical empathy is not sympathy — it is identifying and articulating the emotion the other person is experiencing. Labelling ("It seems like you\'re frustrated," "It sounds like this has been really difficult") defuses negative emotions by bringing them into conscious awareness. Crucially: label negatives to defuse them, reinforce positives to amplify them.',
        k:'"It seems like..." defuses emotion by naming it — try it before any difficult conversation.' },
      { n:'Ch 3', t:'Beware "Yes" — Master "No"',
        s:'"Yes" is often a fake commitment — people say it to escape the conversation. "No" is actually the beginning of real negotiation: it means "I\'m not comfortable yet" or "I need more information." Voss shows how to make it safe for people to say no, which paradoxically creates more genuine cooperation than pushing for yes.',
        k:'Getting to "No" creates safety and starts real negotiation — stop chasing "Yes."' },
      { n:'Ch 4', t:'Trigger the Two Words That Transform Negotiation',
        s:'The goal is not to get the other party to say "You\'re right" (a polite dismissal) but "That\'s right" — the signal of genuine alignment. "That\'s right" emerges when you accurately summarise someone\'s position, worldview, and feelings back to them. It means you have understood them deeply enough that they feel truly heard.',
        k:'"That\'s right" signals genuine alignment — build toward it with accurate summaries.' },
      { n:'Ch 5', t:'Bend Their Reality',
        s:'People make decisions based on perceived value, not absolute value. Anchoring — making the first extreme offer — sets the reference point for the entire negotiation. Deadlines, scarcity, and loss framing ("What do you lose if this falls through?") exploit cognitive biases powerfully. Odd-number offers signal careful calculation and are taken more seriously.',
        k:'Frame your offer around what the other side loses by not accepting — loss aversion is your tool.' },
      { n:'Ch 6', t:'Create the Illusion of Control',
        s:'Calibrated questions — open-ended questions starting with "How" or "What" — are the most powerful tool in a negotiator\'s arsenal. They give the other party the sense of being in control while actually guiding the conversation toward your objectives. "How am I supposed to do that?" forces the other side to solve your problem for you.',
        k:'"How" and "What" questions give control while gathering information — use them relentlessly.' },
      { n:'Ch 7', t:'Guarantee Execution',
        s:'Reaching an agreement is not the same as ensuring it gets implemented. The Rule of Three: get the other side to commit to the same thing three times in three different ways to expose deception. Read body language and paralanguage — incongruent signals between words and tone indicate the agreement is not genuine.',
        k:'Commit → Confirm → Confirm again in a different form. Inconsistency reveals hidden resistance.' },
      { n:'Ch 8', t:'Bargain Hard',
        s:'The Ackerman model: set your target price, open at 65% of it, then move to 85%, 95%, and 100% — with each concession getting smaller, signalling you are approaching your limit. The final offer should include a non-round number (e.g. $37,893) and a non-monetary throw-in, which signals the number was calculated carefully.',
        k:'Make smaller and smaller concessions — the pattern signals you are at your real limit.' },
      { n:'Ch 9', t:'Find the Black Swan',
        s:'Black Swans are unknown unknowns — hidden pieces of information that, when discovered, can completely transform a negotiation. The other side always has motivations, constraints, and pressures you don\'t know about. Listening for what doesn\'t fit, what seems irrational, or what is conspicuously avoided reveals Black Swans.',
        k:'What seems irrational is usually a clue — keep asking "why" until the hidden constraint appears.' },
      { n:'Appx.', t:'Prepare a Negotiation One Sheet',
        s:'Voss provides a one-page preparation framework: define your goals (optimistic, realistic, worst case), summarise the situation from the other side\'s perspective, identify the labels and calibrated questions you will use, define your non-monetary offers, and set your Ackerman range in advance. Preparation is where negotiation is won or lost.',
        k:'Prepare every negotiation in writing before it starts — improvisation is the amateur\'s strategy.' },
    ]
  },

  {
    id: 'just-listen', category: 'comm',
    title: 'Just Listen', author: 'Mark Goulston',
    tagline: 'Discover the secret to getting through to absolutely anyone.',
    emoji: '👂',
    grad: 'linear-gradient(135deg, #c084fc 0%, #9333ea 50%, #581c87 100%)',
    insight: 'Getting through to people is not about being more persuasive — it is about making them feel so genuinely heard and understood that their defensiveness drops and they become willing to listen to you.',
    chapters: [
      { n:'Intro', t:'Getting Through to Anyone',
        s:'Psychiatrist and FBI hostage-negotiation trainer Mark Goulston opens with a paradox: the harder you push to persuade someone, the more they resist. The secret to genuine influence is not better arguments — it is making the other person feel so completely understood that their instinct to defend and resist simply disappears.',
        k:'The more understood people feel, the more open they become — understanding precedes influence.' },
      { n:'Ch 1', t:'The Persuasion Cycle',
        s:'Goulston maps the journey from resistance to action as a six-stage cycle: Resisting → Listening → Considering → Willing to do → Doing → Glad they did. Most people try to skip stages and push directly for action, which triggers resistance. The entire art of communication is moving someone one stage at a time.',
        k:'Never skip stages — move people one step at a time from resistance toward willing action.' },
      { n:'Ch 2', t:'From Impossible to Difficult to Easy',
        s:'The amygdala hijack — when the emotional brain overwhelms the rational brain — makes people temporarily unreachable. Recognising when someone has been hijacked (flushing, clenching, shutting down) is the first skill. The second is knowing how to calm the hijack before attempting any rational communication. Logic does not work on a hijacked brain.',
        k:'Wait for the amygdala to calm before attempting rational conversation — it\'s biology, not stubbornness.' },
      { n:'Ch 3', t:'Move Toward the Danger',
        s:'The instinct when someone is angry or upset is to back away or defend. The counterintuitive move — leaning into the tension, naming what you observe, asking about it directly — almost always de-escalates faster than retreat. Avoidance signals fear; engagement signals confidence and genuine interest.',
        k:'Move toward discomfort, not away from it — engagement de-escalates more reliably than retreat.' },
      { n:'Ch 4', t:'Make the Other Person Feel Felt',
        s:'The deepest human need in communication is not to be agreed with — it is to be felt. When someone feels that you have genuinely registered their emotional experience, their defensiveness dissolves. Goulston\'s technique: "I can only imagine how you must be feeling" followed by a specific, accurate guess at the emotion.',
        k:'Make people feel felt, not just heard — name the specific emotion they\'re experiencing.' },
      { n:'Ch 5', t:'Be More Interested Than Interesting',
        s:'Most people listen to respond, not to understand. They are composing their next point while the other person is still speaking. Genuinely curious listening — in which you have no agenda other than to understand — is so rare that people notice it immediately and are drawn to it. The most magnetic conversationalists are the most attentive listeners.',
        k:'Listen to understand, not to respond — your next point can wait.' },
      { n:'Ch 6', t:'Rewire Yourself to Listen',
        s:'Goulston addresses the neurological habits that make deep listening difficult: the urge to fix, to judge, to compare, to advise, to one-up. These responses feel helpful but communicate "I\'m not that interested in your experience." He provides specific techniques for interrupting these habits in real time during conversations.',
        k:'Notice your urge to fix or advise — then replace it with one more question instead.' },
      { n:'Ch 7', t:'Fill Up the Other Person\'s Emotional Tank',
        s:'People who feel emotionally depleted — unseen, unappreciated, unacknowledged — cannot give their best. Goulston introduces the "emotional tank" metaphor: every genuine expression of appreciation, gratitude, recognition, or curiosity fills the tank. Criticism, dismissal, and distraction drain it. Full tanks produce cooperation; empty tanks produce conflict.',
        k:'Acknowledge before you ask — you can\'t draw from an empty emotional tank.' },
      { n:'Ch 8', t:'The Power of "Hmmm"',
        s:'The smallest, most genuine signals of attention — "hmmm," "tell me more," "go on" — are disproportionately powerful. They communicate that you are present, that what the other person is saying matters, and that you are not rushing toward your own agenda. Silence, used well, is equally powerful — it creates space for the other person to go deeper.',
        k:'The smallest signals of genuine attention have disproportionate power — use them deliberately.' },
      { n:'Ch 9', t:'The Stipulation Gambit',
        s:'When you know someone has a strong objection, raise it yourself before they can. "I know you\'re probably thinking X — and here\'s why that concern is valid..." This pre-empts defensiveness, demonstrates that you understand their perspective, and builds trust. People cannot argue with you when you\'ve already acknowledged their strongest point.',
        k:'Raise their objection before they do — you disarm the defence before it forms.' },
      { n:'Ch 10', t:'Reach Anyone in a Crisis',
        s:'Crisis communication requires a completely different approach: slow down, lower your voice, match their breathing, and ask permission before offering anything ("Would it be okay if I shared something?"). People in crisis are in amygdala hijack — their rational brain is offline. The only goal is to help them feel safe enough to access it again.',
        k:'In a crisis: slow down, lower your voice, ask permission. Logic comes much, much later.' },
      { n:'Ch 11', t:'The Empathy Jolt',
        s:'The empathy jolt is a radical act of vulnerable honesty — sharing a personal experience of failure, fear, or struggle that directly mirrors what the other person is going through. It breaks through walls that rational argument cannot touch. Vulnerability invites vulnerability; authenticity disarms inauthenticity.',
        k:'Strategic vulnerability — sharing your own struggle — creates connection that argument never can.' },
      { n:'Ch 12', t:'Say What You Mean Without Being Mean',
        s:'Assertiveness without aggression requires precise language: state the specific behaviour, describe the specific impact, and make a specific request — never attack character or make sweeping generalisations. "When you interrupt me in meetings, I lose my train of thought and feel dismissed. Could we agree on a different approach?" This is completely different from "You never listen."',
        k:'Behaviour + Impact + Request — the formula for assertive communication without aggression.' },
    ]
  },

  {
    id: 'nvc', category: 'comm',
    title: 'Nonviolent Communication', author: 'Marshall B. Rosenberg',
    tagline: 'A language of life.',
    emoji: '🕊️',
    grad: 'linear-gradient(135deg, #a78bfa 0%, #7c3aed 50%, #4c1d95 100%)',
    insight: 'Most conflict arises not from evil intent but from habitual language patterns that block compassion. NVC replaces judgement and demand with observation, feeling, need, and request — creating connection even in the hardest conversations.',
    chapters: [
      { n:'Ch 1', t:'Giving from the Heart',
        s:'Rosenberg opens with the central premise: human beings are naturally compassionate, but the language we have inherited blocks that compassion. Violent communication — language that classifies, judges, demands, and diagnoses — is so deeply habitual that most people don\'t notice they are using it. NVC is a return to the natural state of giving and receiving freely.',
        k:'Compassion is our nature — language patterns, not character, are what block it.' },
      { n:'Ch 2', t:'Communication That Blocks Compassion',
        s:'Rosenberg identifies the main forms of "life-alienating communication": moralistic judgements ("you\'re selfish"), comparisons ("why can\'t you be more like..."), denial of responsibility ("I had no choice"), and demands (which imply punishment for non-compliance). These patterns are so normalised in Western culture that they pass as reasonable — but each one systematically destroys connection.',
        k:'Judgements, comparisons, and demands are the four habits that kill connection — learn to spot them.' },
      { n:'Ch 3', t:'Observing Without Evaluating',
        s:'The first component of NVC: distinguishing pure observation from evaluation. "You never listen to me" is an evaluation. "In the last three conversations I started, you checked your phone twice" is an observation. When we mix observation with evaluation, people hear criticism and defend. When we separate them, people can hear the reality we are describing.',
        k:'State what you observed, not what you concluded — facts open conversations, judgements close them.' },
      { n:'Ch 4', t:'Identifying and Expressing Feelings',
        s:'The second component: identifying and honestly expressing feelings. Most people have a severely limited feelings vocabulary — they say "I feel that you are wrong" (a thought) rather than "I feel hurt" (a feeling). Rosenberg provides a rich vocabulary of genuine feelings and distinguishes them from evaluations disguised as feelings ("I feel ignored" = "I think you are ignoring me").',
        k:'Build a feelings vocabulary — most people can name only 3–5 emotions, which severely limits self-expression.' },
      { n:'Ch 5', t:'Taking Responsibility for Our Feelings',
        s:'The third component: connecting feelings to needs. "You make me angry" is a stimulus-response model that denies personal responsibility. NVC reframes this: "When you do X, I feel Y, because I need Z." Our feelings are caused by our unmet needs, not by other people\'s actions. This shift from blame to need is the heart of the NVC transformation.',
        k:'"I feel Y because I need Z" — take responsibility for your feelings by connecting them to your needs.' },
      { n:'Ch 6', t:'Requesting That Which Would Enrich Life',
        s:'The fourth component: making clear, positive, actionable requests — not demands. A request describes a specific present-tense action ("would you be willing to...?"). A demand implies punishment for refusal. The difference lies not in the words but in whether you accept "no" as a valid response. NVC teaches how to make requests while preserving the other person\'s full freedom to decline.',
        k:'A request that cannot be refused is a demand in disguise — make the freedom to say "no" explicit.' },
      { n:'Ch 7', t:'Receiving Empathically',
        s:'Empathy in NVC means giving full, undivided attention to the other person\'s feelings and needs — not advising, consoling, interpreting, or sharing your own experience. Most "empathic" responses are actually intellectual responses: "I understand," "that happened to me too," "have you tried...?" Genuine empathy asks "what are you feeling?" and "what do you need?" and then stays with the answer.',
        k:'Empathy is full presence — all advice, consolation, and storytelling are its enemies.' },
      { n:'Ch 8', t:'The Power of Empathy',
        s:'When people feel genuinely heard, something changes physiologically — tension releases, defences drop, and genuine dialogue becomes possible. Rosenberg demonstrates how sustained empathic listening can transform the most hostile encounters. The paradox of NVC: the more fully you attend to the other person\'s needs, the more quickly they become willing to attend to yours.',
        k:'Full empathy is the fastest path to resolution — the more you give, the more you receive.' },
      { n:'Ch 9', t:'Connecting Compassionately with Ourselves',
        s:'NVC applied inward: replacing self-judgement with self-compassion. When we do something we regret, the NVC alternative to self-punishment is to ask "what need of mine was I trying to meet?" and "what would I do differently next time?" Self-compassion is not self-indulgence — it is the prerequisite for learning and for genuinely compassionate action toward others.',
        k:'Replace self-punishment with self-compassion — ask what need you were trying to meet, not what was wrong with you.' },
      { n:'Ch 10', t:'Expressing Anger Fully',
        s:'Anger is never caused by what others do — it is caused by our own judgements and unmet needs. NVC does not suppress anger; it transforms it. The process: stop and breathe; identify the judgement driving the anger; connect to the underlying need; then express the feeling and need without blaming. This is not spiritual bypassing — it is more powerful than blame because it actually gets needs met.',
        k:'Anger is a signal pointing to an unmet need — express the need, not the blame.' },
      { n:'Ch 11', t:'Conflict Resolution and Mediation',
        s:'NVC provides a clear mediation framework: establish that both parties will first be heard, then translate each position into feelings and needs until both people can hear each other\'s humanity. Most conflicts that appear irreconcilable at the level of positions become solvable at the level of needs — because needs are universal and finite, while positions are infinite and contradictory.',
        k:'Most conflicts are irreconcilable at the level of positions — translate to needs and solutions appear.' },
      { n:'Ch 12', t:'Liberating Ourselves and Counselling Others',
        s:'Rosenberg closes with NVC applied to healing past pain and supporting others through grief. The tool is the same: empathic presence that honours feelings and needs without rushing to fix, reframe, or resolve. He shows how NVC can be used to dissolve resentments held for years — not through forgiveness as a moral duty, but through understanding the unmet need underneath the pain.',
        k:'Resentment dissolves when you connect to the unmet need underneath it — not through effort, but through understanding.' },
    ]
  },

  {
    id: 'crucial', category: 'comm',
    title: 'Crucial Conversations', author: 'Kerry Patterson, Joseph Grenny, Ron McMillan & Al Switzler',
    tagline: 'Tools for talking when stakes are high.',
    emoji: '💬',
    grad: 'linear-gradient(135deg, #c084fc 0%, #9333ea 50%, #581c87 100%)',
    insight: 'The conversations you avoid are costing you the most — in relationships, at work, and in health. The skills to hold high-stakes conversations well are learnable, and they follow a specific, repeatable process.',
    chapters: [
      { n:'Ch 1', t:'What Is a Crucial Conversation?',
        s:'A crucial conversation is any discussion where the stakes are high, opinions differ, and emotions run strong. Most people handle these conversations in one of two dysfunctional ways: they avoid them entirely (silence) or they handle them poorly (violence). Both responses are driven by the same underlying mechanism — the fight-or-flight survival instinct hijacking rational thought.',
        k:'The conversations you are most avoiding are the ones most affecting your life.' },
      { n:'Ch 2', t:'Mastering Crucial Conversations',
        s:'Research across thousands of people and organisations shows that those who handle crucial conversations well create dramatically better outcomes — in health, relationships, and career. The key insight: the skills are not a matter of personality or courage. They are a learnable set of behaviours that anyone can practise and improve.',
        k:'Skill at crucial conversations is not personality — it is a learnable set of specific behaviours.' },
      { n:'Ch 3', t:'Start with Heart: What You Really Want',
        s:'Before any crucial conversation, ask yourself: "What do I really want for myself? For the other person? For the relationship?" Most people enter difficult conversations with an unstated goal of "winning" or "being right." When the goal shifts to "finding a solution that serves everyone," the entire conversational dynamic changes — before a word is spoken.',
        k:'Clarify what you really want before you speak — most arguments start with an unstated goal of winning.' },
      { n:'Ch 4', t:'Learn to Look: Spotting Safety Problems',
        s:'Crucial conversations succeed or fail based on psychological safety — whether both parties feel safe enough to say anything. Safety breaks down in two directions: silence (withdrawing, avoiding, masking) or violence (controlling, labelling, attacking). Learning to spot these signals in yourself and others is the first real-time skill. When safety breaks down, stop the content and restore safety first.',
        k:'Watch for silence or violence — both signal that safety has broken down and must be restored before continuing.' },
      { n:'Ch 5', t:'Make It Safe: Creating the Conditions for Dialogue',
        s:'Safety is restored through two tools: Mutual Purpose (establishing that you care about the other person\'s goals, not just your own) and Mutual Respect (demonstrating genuine regard for the other person as a person). When people believe you have their interests at heart and respect them as human beings, they can hear almost anything.',
        k:'Establish mutual purpose and mutual respect — without both, nothing else works.' },
      { n:'Ch 6', t:'Master My Stories: Controlling Your Emotions',
        s:'Emotions in crucial conversations are not caused by events — they are caused by the stories we tell ourselves about events. The path from event to emotion runs through an interpretation. Mastering your stories means slowing down the emotional chain and asking: "What story am I telling? Is it the only possible story? What would a reasonable person think if they were in my position?"',
        k:'Your emotions come from your story, not the event — change the story, change the emotion.' },
      { n:'Ch 7', t:'STATE My Path: Sharing Difficult Information',
        s:'The STATE acronym: Share your facts (start with observable data), Tell your story (share your interpretation, owned as yours), Ask for their perspective (invite dialogue), Talk tentatively (hold your story loosely), and Encourage testing (make it safe to disagree). This sequence allows you to share even harsh truths in a way that preserves safety and invites genuine dialogue.',
        k:'Share facts first, story second, tentatively — and always invite the other side\'s perspective.' },
      { n:'Ch 8', t:'Explore Others\' Paths: Listening to Understand',
        s:'The AMPP listening model: Ask (invite them to share), Mirror (acknowledge their emotions), Paraphrase (restate to show you understand), Prime (if they won\'t open up, offer your best guess at what they might be thinking to break the silence). The goal of all four techniques is the same: to make the other person feel safe enough to share their full truth.',
        k:'Ask, Mirror, Paraphrase, Prime — four tools to draw out what people are afraid to say.' },
      { n:'Ch 9', t:'Move to Action: Converting Dialogue into Results',
        s:'Dialogue without decision and action is just a pleasant conversation. After a crucial conversation, explicitly decide how decisions will be made (command, consult, vote, or consensus), assign clear accountability with specific deadlines, and document what was agreed. The four common failure modes: unclear decision process, unclear ownership, no deadline, no follow-up.',
        k:'Dialogue without explicit decision, ownership, and deadline produces nothing — close every crucial conversation with all three.' },
      { n:'Ch 10', t:'Putting It All Together',
        s:'The authors provide a consolidated model of the full crucial conversations process and a practical self-assessment. They emphasise that the skills build on each other: you cannot STATE your path effectively if you haven\'t mastered your story; you cannot make it safe if you haven\'t started with heart. The practice is cumulative and each skill reinforces all others.',
        k:'The skills are a system — each one depends on and reinforces all the others.' },
    ]
  },

  /* ── DEVELOPMENT ─────────────────────────────────────────── */
  {
    id: 'give-take', category: 'dev',
    title: 'Give and Take', author: 'Adam Grant',
    tagline: 'Why helping others drives our success.',
    emoji: '🤲',
    grad: 'linear-gradient(135deg, #0ea5e9 0%, #0284c7 50%, #075985 100%)',
    insight: 'In every domain of life, people fall into one of three styles: givers, takers, and matchers. The most successful and the least successful people share one trait — they are both givers. What separates them is how they give.',
    chapters: [
      { n:'Intro', t:'Good Returns: The Dangers and Rewards of Giving',
        s:'Grant introduces three reciprocity styles that shape our professional relationships: takers (who try to get more than they give), matchers (who aim for equal exchange), and givers (who contribute without expecting something in return). Counterintuitively, both the top and bottom performers tend to be givers — context determines which outcome unfolds.',
        k:'Givers occupy both the top and bottom of success ladders — what separates them is how they give.' },
      { n:'Ch 1', t:'Good Returns: The Spectrum of Reciprocity',
        s:'Research across engineering firms, medical schools, and sales teams shows that givers generate more value for organisations than takers or matchers. But givers also burn out when they give without boundaries. The key distinction is between selfless giving (which depletes) and otherish giving (which is strategic and sustainable).',
        k:'The most effective givers are "otherish" — they genuinely care about others AND about their own interests.' },
      { n:'Ch 2', t:'The Peacock and the Panda: How Givers Build Networks',
        s:'Takers build networks strategically, targeting influential contacts. Givers build broader, deeper networks by helping people regardless of their status or utility. Dormant ties — people you once knew well but haven\'t contacted in years — are among the most valuable network assets, and givers maintain them better than takers.',
        k:'Help people regardless of their current status — dormant ties become your most valuable connections.' },
      { n:'Ch 3', t:'The Ripple Effect: Collaboration and Giving',
        s:'In team settings, one giver can lift the performance of an entire group by modelling generosity and creating psychological safety. But one taker can destroy a team\'s culture. Grant shows that teams with one highly cooperative member outperform groups where everyone cooperates moderately — the giver\'s behaviour is contagious.',
        k:'One giver can elevate an entire team — generosity is more contagious than selfishness.' },
      { n:'Ch 4', t:'Finding the Diamond in the Rough: Recognising Talent',
        s:'Givers are better at recognising and developing potential in others because they look for what people could become rather than what they currently are. Takers judge people on present utility. Grant profiles C.J. Skender — a legendary accounting professor who mentored hundreds of students others had written off — as the archetype.',
        k:'Invest in people\'s potential, not just their current performance.' },
      { n:'Ch 5', t:'The Power of Powerless Communication',
        s:'Takers tend to use powerful communication — assertive, confident, dominant. Givers often use powerless communication — asking questions, admitting uncertainty, seeking advice. Counterintuitively, powerless communication is often more persuasive because it builds trust and invites collaboration rather than triggering resistance.',
        k:'Asking for advice is more persuasive than making assertions — it disarms resistance.' },
      { n:'Ch 6', t:'The Art of Motivation Maintenance: Why Givers Don\'t Burn Out',
        s:'Givers who see the impact of their giving — who connect their effort to real outcomes for real people — sustain motivation far longer than those who give without feedback. Even brief exposure to the beneficiaries of your work dramatically increases persistence, quality, and generosity. Impact stories are rocket fuel for givers.',
        k:'See the real impact of your giving — it\'s the most reliable source of sustained motivation.' },
      { n:'Ch 7', t:'Chump Change: Overcoming the Doormat Effect',
        s:'Givers become "doormats" when they give to takers who exploit them. The solution is not to stop giving but to screen for takers and redirect generosity toward matchers and fellow givers. Setting conditions ("I\'ll help you if you also help someone else") amplifies the giver\'s impact without enabling exploitation.',
        k:'Give generously but screen for takers — redirect your energy toward those who appreciate and reciprocate it.' },
      { n:'Ch 8', t:'The Scrooge Shift: Why Successful People Give Back',
        s:'The most successful long-term givers are not those who give most at any single moment but those who build giving into their identity and systems over time. Grant profiles how takers sometimes transform into givers after experiencing the limits of taking — and how this shift, once made, tends to be permanent.',
        k:'Make giving part of your identity, not just an occasional act — then it compounds over a lifetime.' },
      { n:'Epil.', t:'Actions for Impact',
        s:'Grant closes with practical frameworks for building a giving culture: the five-minute favour (a small act of help that costs little but creates value), the reciprocity ring (structured peer-help in groups), and chunking helping time (giving in focused blocks rather than constant interruptions). Giving is a skill with learnable techniques.',
        k:'Build giving into your systems — small, consistent acts of help compound into extraordinary impact.' },
    ]
  },

  {
    id: 'originals', category: 'dev',
    title: 'Originals', author: 'Adam Grant',
    tagline: 'How non-conformists move the world.',
    emoji: '💡',
    grad: 'linear-gradient(135deg, #38bdf8 0%, #0369a1 50%, #0c4a6e 100%)',
    insight: 'Originals are not fearless — they feel the same doubt and fear as everyone else. What makes them different is that they act despite their doubts, and they have learned specific strategies for championing new ideas effectively.',
    chapters: [
      { n:'Intro', t:'Rejecting the Default',
        s:'Grant opens with the Warby Parker story: four MBA students who delayed launching their eyewear company for months, kept their day jobs, and still built a billion-dollar business. This challenges the myth that originals are reckless risk-takers. In fact, the most successful innovators are often the most strategic about managing risk.',
        k:'Originals don\'t take bigger risks — they take calculated risks and hedge everywhere else.' },
      { n:'Ch 1', t:'Creative Destruction: The Risky Business of Going Against the Grain',
        s:'The biggest risk is not taking any risk. Grant examines what predicts who will become an original — and finds that having a "broad portfolio" (keeping a day job while pursuing an idea) dramatically increases the odds of success. The entrepreneurs who kept their jobs had 33% lower failure rates than those who quit immediately.',
        k:'Keep the day job — hedging your bets is not a lack of commitment; it\'s strategic risk management.' },
      { n:'Ch 2', t:'Blind Inventors and One-Eyed Kings: Recognising Original Ideas',
        s:'We are terrible judges of our own ideas. The most creative people generate the most ideas — including the most bad ones — because volume is the best predictor of hitting on something exceptional. Quantity enables quality. The solution is not to trust your own judgement but to build better feedback loops and test ideas with divergent evaluators.',
        k:'Generate more ideas — the best predictor of a great idea is the total number of ideas produced.' },
      { n:'Ch 3', t:'Out on a Limb: Speaking Truth to Power',
        s:'The biggest barrier to originality inside organisations is not bad ideas — it is the fear of speaking up. Grant identifies who successfully challenges authority (not stars or newcomers, but respected insiders with demonstrated commitment) and how to frame dissent to be heard (lead with values, not complaints; use "yes, and" not "no, because").',
        k:'Frame your challenge in terms of shared values — you\'ll be heard as a committed insider, not a critic.' },
      { n:'Ch 4', t:'Fools Rush In? The Timing of Voice and Action',
        s:'First-mover advantage is largely a myth — most first movers fail, and fast followers who enter a market once demand is proven succeed more often. The same logic applies to ideas: arriving second or third, once the audience is primed, can be more effective than arriving first. Strategic procrastination creates space for ideas to mature.',
        k:'Wait until the audience is ready — being second or third to market often beats being first.' },
      { n:'Ch 5', t:'Goldilocks and the Trojan Horse: Creating Coalitions',
        s:'Originals build coalitions not by finding perfect allies who agree entirely but by finding people with one point of agreement — and linking that to the cause. The Trojan Horse strategy embeds a new idea inside an existing, accepted framework. Framing a new idea as an extension of the status quo, not a replacement, reduces resistance dramatically.',
        k:'Find the one thing you agree on, then build the coalition around that single point of overlap.' },
      { n:'Ch 6', t:'Rebel with a Cause: How Siblings and Mentors Nurture Originality',
        s:'Laterborns (not firstborns) are statistically more likely to become originals — they can\'t dominate through size or seniority, so they develop creative strategies and risk tolerance. Parents who explain the reasons behind rules (not just issue commands) raise more morally independent children. Role models who embody originality are more powerful than abstract encouragement.',
        k:'Explain the "why" behind rules to children — it builds moral autonomy, not compliance.' },
      { n:'Ch 7', t:'Rethinking Groupthink: The Myths of Strong Cultures',
        s:'Strong cultures do not prevent groupthink — they can accelerate it. Commitment cultures that hire only true believers eliminate the dissent that protects against bad decisions. Bridgewater Associates\' radical transparency creates safety for devil\'s advocates. The best organisations hire for cultural contribution, not cultural fit.',
        k:'Hire for cultural contribution — people who challenge the culture — not just cultural fit.' },
      { n:'Ch 8', t:'Rocking the Boat and Keeping It Steady: Managing Anxiety and Doubt',
        s:'Originals use three strategies to manage fear and maintain commitment: (1) focus on the regret of not trying, not the fear of failure; (2) doubting your doubts — asking "what makes me think this won\'t work?" rather than "what makes me think this will work?"; (3) building a network of dissimilar supporters who each fill a different emotional need.',
        k:'Regret of inaction outlasts regret of action — use this asymmetry to push through fear.' },
      { n:'Epil.', t:'Rethinking Originals',
        s:'Grant closes by reframing originality as something everyone is capable of — not a rare trait of geniuses, but a set of learnable behaviours available to anyone willing to question defaults, develop more ideas, manage their timing, and build coalitions. The world defaults to conformity; originality is the conscious, deliberate choice to question that default.',
        k:'Originality is not a talent — it is the decision to ask "why does it have to be this way?"' },
    ]
  },

  {
    id: 'option-b', category: 'dev',
    title: 'Option B', author: 'Adam Grant & Sheryl Sandberg',
    tagline: 'Facing adversity, building resilience, and finding joy.',
    emoji: '🌱',
    grad: 'linear-gradient(135deg, #22d3ee 0%, #0891b2 50%, #164e63 100%)',
    insight: 'Resilience is not a fixed trait — it is a set of muscles that can be built. When Option A is gone, the goal is not to find a perfect substitute but to kick the hell out of Option B.',
    chapters: [
      { n:'Ch 1', t:'Breathing Again',
        s:'Sandberg opens weeks after her husband Dave\'s sudden death. Grant introduces the three P\'s that block recovery: personalisation (it\'s my fault), pervasiveness (it ruins everything), and permanence (it will never get better). Challenging these distortions — separating them from reality — is the first step toward post-traumatic growth.',
        k:'Challenge the three P\'s — personalisation, pervasiveness, permanence — they are distortions, not facts.' },
      { n:'Ch 2', t:'Kicking the Elephant Out of the Room',
        s:'After loss, well-meaning friends avoid mentioning the person who died, leaving grievers isolated in their pain. Acknowledging the loss directly — saying the person\'s name, asking how they are — is more healing than protective silence. Research shows that social support through adversity predicts recovery better than almost any other factor.',
        k:'Name the loss, say the person\'s name — silence isolates; acknowledgement heals.' },
      { n:'Ch 3', t:'The Platinum Rule of Friendship',
        s:'The Golden Rule ("treat others as you wish to be treated") fails in grief — people in pain need to be treated as they wish to be treated, not as we would want. The Platinum Rule: ask "what do you need?" rather than projecting your own preferences. Checking in repeatedly over time matters more than one large gesture immediately after loss.',
        k:'Ask what they need, don\'t assume — the Platinum Rule of support after loss.' },
      { n:'Ch 4', t:'Self-Compassion and Self-Confidence After Trauma',
        s:'After adversity, the inner critic intensifies — "what could I have done differently?" becomes an obsession. Self-compassion (treating yourself with the kindness you would give a close friend) is not self-indulgence — it is the foundation of recovery. It predicts faster return to normal functioning and greater subsequent resilience.',
        k:'Treat yourself after failure the way you would treat a good friend — with honesty and kindness.' },
      { n:'Ch 5', t:'Bouncing Forward: Post-Traumatic Growth',
        s:'Post-traumatic growth — genuine positive transformation following crisis — is more common than post-traumatic stress. It manifests as deeper relationships, new possibilities, increased personal strength, greater appreciation for life, and spiritual development. Growth does not erase grief — it coexists with it. Building the narrative of growth accelerates it.',
        k:'Post-traumatic growth is real and common — look for it actively alongside the pain.' },
      { n:'Ch 6', t:'Taking Back Joy',
        s:'Joy after loss is not a betrayal — it is a sign of healing and a gift to those who love you. The permission to experience positive emotions — even small ones — is essential to recovery. "Breathing rooms" of joy, laughter, and play are not denial; they are the oxygen that makes continued grieving sustainable.',
        k:'Joy is not a betrayal of loss — it is the evidence of resilience and a form of honour.' },
      { n:'Ch 7', t:'Raising Resilient Kids',
        s:'Children are more resilient than adults typically assume — and overprotecting them from difficulty reduces their resilience. Grant and Sandberg show how explaining loss honestly, allowing children to express all emotions including anger and confusion, and modelling resilience (not false cheerfulness) builds lasting emotional strength in children.',
        k:'Model resilience honestly — children learn to handle adversity by watching how adults handle it.' },
      { n:'Ch 8', t:'Finding Strength Together: Community and Collective Resilience',
        s:'Individual resilience is amplified enormously by community. Shared adversity can either fracture groups or forge deep bonds — the difference lies in whether the community acknowledges collective grief openly and creates rituals around it. African American communities\' emphasis on collective grieving and communal support produces higher resilience under systemic adversity.',
        k:'Collective resilience amplifies individual resilience — grief shared is grief halved.' },
      { n:'Ch 9', t:'Failing and Learning at Work',
        s:'Organisations that punish failure suppress learning and create the conditions for larger failures later. Psychological safety — the belief that you can speak up, fail, and dissent without career consequences — is the strongest predictor of team performance. Leaders who share their own failures and learning model the culture that makes recovery possible.',
        k:'Share your failures openly — psychological safety is the foundation of organisational resilience.' },
      { n:'Ch 10', t:'The Option B Mindset',
        s:'Grant and Sandberg close with the central reframe: Option A is not always recoverable, but Option B — the life built from what remains — can be rich, meaningful, and even better in unexpected ways. The goal is not acceptance in the sense of endorsement, but in the sense of clear-eyed engagement with reality as it is.',
        k:'Option B is not the consolation prize — it is a life built from genuine strength and clarity.' },
    ]
  },

  {
    id: 'think-again', category: 'dev',
    title: 'Think Again', author: 'Adam Grant',
    tagline: 'The power of knowing what you don\'t know.',
    emoji: '🔄',
    grad: 'linear-gradient(135deg, #7dd3fc 0%, #0284c7 50%, #0c4a6e 100%)',
    insight: 'Intelligence is traditionally about knowing and thinking more. In a rapidly changing world, the most critical skill is the willingness to rethink and unlearn — to think like a scientist rather than a preacher, prosecutor, or politician.',
    chapters: [
      { n:'Intro', t:'A Preacher, a Prosecutor, a Politician, and a Scientist',
        s:'Grant identifies four modes of thinking. Preachers defend their beliefs as sacred. Prosecutors attack others\' logic. Politicians seek approval. Scientists form hypotheses, test them, and update based on evidence. In a changing world, the scientific mode — the willingness to be wrong — is the rarest and most valuable cognitive skill.',
        k:'Think like a scientist: form hypotheses, test them, and update when the evidence contradicts you.' },
      { n:'Ch 1', t:'The Armchair Quarterback and the Impostor',
        s:'Confidence and competence are poorly correlated. The Dunning-Kruger effect: novices overestimate their ability because they lack the knowledge to recognise their ignorance. But excessive humility — impostor syndrome — also impedes performance. The sweet spot is "confident humility": believing in your ability to learn while doubting your current conclusions.',
        k:'Aim for confident humility — certain of your capacity to learn, uncertain of your current knowledge.' },
      { n:'Ch 2', t:'The Joy of Being Wrong',
        s:'The most successful forecasters (studied by Philip Tetlock) update their predictions frequently as new information arrives — they wear being wrong as a badge of intellectual engagement, not a source of shame. Grant argues that detaching your self-worth from your opinions is the foundational skill of rethinking. Your ideas are not you.',
        k:'Detach your identity from your opinions — being wrong becomes exciting, not threatening.' },
      { n:'Ch 3', t:'The Good Fight Club: The Psychology of Constructive Conflict',
        s:'Relationship conflict (about people and personalities) harms performance. Task conflict (about ideas and approaches) improves it. High-performing teams have more task conflict than average teams — they disagree productively about the work. The challenge is keeping disagreements on the level of ideas, not identities.',
        k:'Argue about ideas, not people — task conflict improves performance; relationship conflict destroys it.' },
      { n:'Ch 4', t:'Dances with Foes: How to Win Debates and Influence People',
        s:'The instinct in argument is to pile on more evidence when the other person disagrees. Research shows this backfires — it triggers reactance. The more effective approach: acknowledge the complexity of the issue, find the strongest version of their argument, concede valid points, and ask questions that open rather than close the conversation.',
        k:'Concede what\'s valid in the other side\'s argument — it builds credibility and opens minds.' },
      { n:'Ch 5', t:'Vaccine Whisperers: How the Right Kind of Listening Motivates Change',
        s:'Motivational interviewing — the clinical technique of asking people about their own reasons for change rather than lecturing them — is dramatically more effective than persuasion campaigns. When people articulate their own reasons for change, those reasons become theirs. Asking "how confident are you in this belief, on a scale of 1-10?" and then "why not lower?" consistently shifts positions.',
        k:'Ask people for their own reasons to change — they\'re always more persuasive than yours.' },
      { n:'Ch 6', t:'Bad Blood on the Diamond: Diminishing Stereotypes',
        s:'Counterstereotypic examples (a female surgeon, a gentle male athlete) only reinforce stereotypes if presented as exceptions. Deep canvassing — extended, non-judgmental conversation that asks people about their own experiences of prejudice and connects those to the group they hold prejudice toward — produces durable attitude change.',
        k:'Deep, personal conversations about shared vulnerability change attitudes — brief messaging does not.' },
      { n:'Ch 7', t:'Charged Conversations: Depolarising Our Divided Discussions',
        s:'On highly polarised topics, presenting both sides equally can entrench existing views rather than open minds. Presenting the full complexity — including tensions within each side — disrupts the binary thinking that feeds polarisation. Acknowledging that you hold contradictory views yourself signals intellectual honesty and disarms opponents.',
        k:'Present complexity, not both sides — binary framing feeds polarisation; nuance breaks it.' },
      { n:'Ch 8', t:'Rewriting the Textbook: Why We Should Teach Rethinking',
        s:'Education systems overwhelmingly reward remembering over rethinking. The most effective teachers frame knowledge as provisional — presenting debates and unresolved questions rather than settled facts. Students who learn to think in arguments and counterarguments develop lasting intellectual humility and superior long-term retention.',
        k:'Teach debates and open questions, not just settled facts — uncertainty is intellectually honest.' },
      { n:'Ch 9', t:'That\'s Not How We\'ve Always Done It: Building Learning Cultures',
        s:'Process accountability (review decisions by the quality of your reasoning, not just the outcomes) creates learning cultures. Outcome accountability creates cultures that hide failures. Leaders who model rethinking by publicly changing their minds create psychological safety for others to do the same. Learning cultures outperform performance cultures long-term.',
        k:'Judge decisions by the quality of reasoning at the time, not by outcomes — it builds learning cultures.' },
      { n:'Epil.', t:'Reconsidering Our Assumptions',
        s:'Grant closes with the concept of "life review" — regularly scheduling time to reconsider your long-held assumptions, career trajectory, and identity claims. The people who update their beliefs and identities throughout life report greater satisfaction and wisdom than those who crystallise early and stop questioning. Rethinking is not a weakness — it is a sign of intellectual maturity.',
        k:'Schedule regular life reviews — rethinking your identity and assumptions is a sign of growth, not instability.' },
    ]
  },

  {
    id: 'hidden-potential', category: 'dev',
    title: 'Hidden Potential', author: 'Adam Grant',
    tagline: 'The science of achieving greater things.',
    emoji: '🌟',
    grad: 'linear-gradient(135deg, #0284c7 0%, #0369a1 50%, #1e3a5f 100%)',
    insight: 'Potential is not a fixed endowment — it is a set of opportunities to grow. The people who achieve the most are not those with the most raw talent, but those who build the character skills, learning structures, and support systems that allow them to grow the furthest.',
    chapters: [
      { n:'Intro', t:'The Misconception of Natural Talent',
        s:'Grant opens by challenging the cult of raw talent. Standardised tests and early assessments miss the qualities that matter most for long-term achievement: character skills (proactivity, determination, discipline) and the willingness to seek discomfort. The students who grow the most are rarely the ones who start the furthest ahead.',
        k:'Starting ahead is not a reliable predictor of finishing ahead — character skills matter more than raw talent.' },
      { n:'Ch 1', t:'Creatures of Discomfort: Seeking the Learning Zone',
        s:'Growth requires operating in the "learning zone" — challenging enough to stretch, not so hard you collapse. But most people avoid discomfort, staying in the comfort zone where growth is minimal. Grant profiles polyglot language learners who embrace imperfection and embarrassment as signals of being in the right zone, not the wrong one.',
        k:'Seek discomfort deliberately — embarrassment and struggle are signs you\'re in the learning zone.' },
      { n:'Ch 2', t:'The Imperfectionist: Embracing Messy First Attempts',
        s:'Perfectionism is not a strength — it is an obstacle to learning. Perfectionists avoid the imperfect early attempts that are the necessary precondition for excellent later performance. "Better done than perfect" is not mediocrity — it is the scientific reality of how skill develops. First drafts, rough sketches, and bad early reps are essential.',
        k:'Embrace imperfect first attempts — they are not failures; they are the raw material of mastery.' },
      { n:'Ch 3', t:'The Perfectionist\'s Trap: When High Standards Backfire',
        s:'There is a difference between holding high standards for your work and requiring that every step meet those standards. The former drives excellence; the latter creates paralysis and anxiety. Grant shows how elite performers in sports, music, and academia protect early exploration from their critical inner voice, then apply rigour in refinement.',
        k:'Protect early exploration from your critical eye — apply rigour at the refinement stage, not the generation stage.' },
      { n:'Ch 4', t:'Transformative Teachers: The Power of High Expectations',
        s:'Research on Pygmalion effects shows that teachers\' expectations become self-fulfilling prophecies through a specific mechanism: when teachers believe in students, they give them harder material, more feedback, and more warmth. The combination of high challenge and high support is the specific formula that accelerates growth most reliably.',
        k:'High challenge + high support = the precise combination that most accelerates growth in others.' },
      { n:'Ch 5', t:'Deliberate Play: Making Practice Enjoyable',
        s:'"Deliberate practice" — systematic, uncomfortable, feedback-rich repetition — is the most effective way to build skill. But it is also exhausting and requires enormous motivation. Grant introduces "deliberate play" — practice that is challenging and intrinsically enjoyable — as the sustainable alternative that keeps learners engaged long enough to become expert.',
        k:'Make practice enjoyable enough to sustain — long-term commitment matters more than short-term intensity.' },
      { n:'Ch 6', t:'Getting Unstuck: When to Persist and When to Pivot',
        s:'The sunk cost fallacy causes people to persist in failing strategies because they have already invested heavily. Grant introduces the concept of "escalation of commitment" and the signals that distinguish productive struggle (growth is happening slowly) from unproductive struggle (the ceiling is fixed). Knowing when to pivot is as important as knowing how to persist.',
        k:'Distinguish productive struggle (slow growth) from unproductive struggle (a fixed ceiling) — then act accordingly.' },
      { n:'Ch 7', t:'Every Child Gets Ahead: Educational Equity and Hidden Potential',
        s:'Finland\'s educational system — which spends disproportionate resources on struggling students rather than gifted programmes — consistently produces the world\'s best outcomes. Grant argues that the systems producing the most "hidden potential" are those designed to raise the floor, not the ceiling. Talent is evenly distributed; opportunity is not.',
        k:'Raise the floor, not the ceiling — the highest performers come from systems designed to support everyone.' },
      { n:'Ch 8', t:'Diamonds in the Rough: How Organisations Develop Underrated Talent',
        s:'Hiring processes systematically screen out people with unconventional backgrounds and non-linear trajectories — precisely the people most likely to bring original perspectives and resilience. Grant documents companies (like Unilever and the NBA) that redesigned their talent pipelines to look for learning agility and character skills rather than traditional credentials.',
        k:'Hire for learning agility and character — credentials predict past performance, not future growth.' },
      { n:'Ch 9', t:'Mining for Gold: How to Unlock Hidden Potential in Others',
        s:'The most effective coaches and mentors focus on the quality of process, not outcomes. They create "scaffold scaffolding" — building the skills to learn how to learn — rather than teaching content directly. They also provide specific, actionable feedback on what to do differently, not just what went wrong. These are teachable behaviours.',
        k:'Teach people how to learn, not just what to do — meta-learning skills compound for a lifetime.' },
    ]
  },

  {
    id: 'art-combat', category: 'mgmt',
    title: 'Искусство управленческой борьбы', author: 'Владимир Тарасов',
    tagline: 'Технологии перехвата и удержания управления.',
    emoji: '⚔️',
    grad: 'linear-gradient(135deg, #e11d48 0%, #9f1239 50%, #4c0519 100%)',
    insight: 'Управление — это борьба за картины мира. Победитель не тот, кто подавил оппонента, а тот, кто помог ему увидеть реальность точнее. Настоящее управление строится не на страхе, а на понимании.',
    chapters: [
      { n:'Гл. 1', t:'Природа управленческой борьбы',
        s:'Управление — это непрерывная борьба, в которой каждый участник стремится изменить картину мира другого в нужную сторону. Тарасов вводит ключевую идею: эффективный руководитель не просто отдаёт приказы — он управляет восприятием реальности своих подчинённых и оппонентов. Тот, кто лучше понимает природу этой борьбы, всегда имеет преимущество.',
        k:'Управление ведётся на уровне картин мира, а не на уровне приказов.' },
      { n:'Гл. 2', t:'Картина мира как главный инструмент',
        s:'У каждого человека есть субъективная картина мира — его представление о том, как устроена реальность. Управленческая борьба ведётся именно на этом уровне: не через факты и логику, а через то, как эти факты воспринимаются. Кто сумел изменить картину мира оппонента — тот выиграл борьбу, даже не вступив в прямой конфликт.',
        k:'Измени картину мира человека — и его поведение изменится само собой.' },
      { n:'Гл. 3', t:'Сильная и слабая позиция',
        s:'Позиция в управленческой борьбе определяется не ресурсами и не должностью, а правом принимать решения и не объяснять их. Слабая позиция — когда ты вынужден оправдываться и объяснять. Сильная — когда другие объясняются тебе. Тарасов показывает, как занять сильную позицию независимо от формального статуса и текущей ситуации.',
        k:'Сильная позиция — это когда другие объясняются тебе, а не ты им.' },
      { n:'Гл. 4', t:'Управленческий поединок',
        s:'Поединок — это не конфликт, а технология выяснения того, кто лучше понимает ситуацию и способен ею управлять. Тарасов описывает правила и форматы управленческих поединков, которые он разработал для отбора и развития менеджеров. Поединок выявляет реальный управленческий потенциал человека точнее любого собеседования.',
        k:'Управленческий поединок — лучший способ проверить реальные компетенции менеджера.' },
      { n:'Гл. 5', t:'Перехват управления',
        s:'Перехват управления — это взятие инициативы в ситуации, где формальная власть принадлежит другому. Тарасов описывает конкретные техники: задавание правильных вопросов, переформулирование задачи, управление пространством и временем встречи. Перехват — это не агрессия, а демонстрация более точного понимания ситуации.',
        k:'Перехватить управление — значит показать, что ты понимаешь ситуацию лучше.' },
      { n:'Гл. 6', t:'Принципы ведения переговоров',
        s:'Ключевые принципы Тарасова: "не спорь с сильным — согласись и возьми его аргумент на вооружение", "соглашайся с тем, с чем не можешь не согласиться", "управляй местом и временем встречи — они работают на тебя или против тебя". Каждый принцип иллюстрируется реальными управленческими ситуациями.',
        k:'Согласие с сильным аргументом противника — это не слабость, а техника перехвата инициативы.' },
      { n:'Гл. 7', t:'Работа с сопротивлением',
        s:'Сопротивление подчинённых — не враг и не сбой системы, а ценный сигнал о несовпадении картин мира. Тарасов показывает, как превратить сопротивление в диалог, а диалог — в инструмент выравнивания понимания и достижения подлинного, а не показного согласия. Подавленное сопротивление возвращается в трёхкратном размере.',
        k:'Сопротивление — это сигнал: картины мира не совпадают. Работай с ним, а не подавляй его.' },
      { n:'Гл. 8', t:'Философия победителя',
        s:'Победитель управленческой борьбы в понимании Тарасова — не тот, кто унизил или подавил оппонента, а тот, кто помог ему увидеть более точную картину мира. Настоящая управленческая победа оставляет побеждённого с ощущением справедливости. Это и есть основа долгосрочного авторитета руководителя.',
        k:'Настоящая победа оставляет оппонента с ощущением справедливости — только такой авторитет долговечен.' },
    ]
  },

  {
    id: 'life-tech', category: 'mgmt',
    title: 'Технология жизни. Книга для героев', author: 'Владимир Тарасов',
    tagline: 'Как выстраивать жизнь технологично и стать героем своей судьбы.',
    emoji: '🏔️',
    grad: 'linear-gradient(135deg, #f43f5e 0%, #be123c 50%, #881337 100%)',
    insight: 'Жизнь можно выстраивать технологично — не полагаясь на случай, а создавая условия для нужных событий. Герой — не бесстрашный человек, а тот, кто берёт ответственность на себя, когда другие ищут виноватых.',
    chapters: [
      { n:'Гл. 1', t:'Жизнь как технология',
        s:'Большинство людей проживают жизнь реактивно — реагируя на события, а не создавая их. Тарасов предлагает иной подход: смотреть на свою жизнь как на управляемый проект, в котором есть цели, инструменты и технологии их достижения. Главный ресурс — не деньги и не связи, а точность картины мира самого себя.',
        k:'Жизнь — управляемый проект, а не поток событий, которым остаётся только реагировать.' },
      { n:'Гл. 2', t:'Кто такой герой',
        s:'Герой в понимании Тарасова — не богатырь и не супермен. Это человек, который берёт ответственность на себя там, где другие ждут удобного момента или ищут виноватых. Героизм — это выбор, совершаемый в каждой конкретной ситуации. Это не врождённое качество, а позиция, которую можно в себе воспитать.',
        k:'Героизм — это выбор брать ответственность, когда никто другой этого не делает.' },
      { n:'Гл. 3', t:'Картина мира и жизненная позиция',
        s:'Наши убеждения о реальности формируют наши действия точнее, чем сама реальность. Изменить жизнь — значит прежде всего изменить картину мира. Тарасов показывает, как неосознанные убеждения ("я не достоин", "это невозможно", "так не принято") незаметно блокируют рост, и как выявить и заменить их на более точные.',
        k:'Твои убеждения о реальности управляют тобой сильнее, чем сама реальность.' },
      { n:'Гл. 4', t:'Принципы победителя',
        s:'Тарасов формулирует жизненные принципы, позволяющие принимать верные решения в условиях неопределённости: "делай то, что ты можешь сделать лучше других", "не соревнуйся там, где ты заведомо слабее — ищи поле, где твоё преимущество максимально", "береги лицо — своё и чужое, это основа доверия". Каждый принцип разобран на практических примерах.',
        k:'Играй там, где у тебя преимущество — и никогда не теряй лица ни своего, ни чужого.' },
      { n:'Гл. 5', t:'Стратегия и тактика жизни',
        s:'Стратегия — это выбор, где сосредоточить усилия; тактика — как их применить. Большинство людей превосходно решают тактические задачи, но никогда всерьёз не задумываются о стратегии своей жизни. Тарасов учит расставлять приоритеты исходя из долгосрочного видения: не "что я хочу сделать завтра", а "кем я хочу стать через десять лет".',
        k:'Без стратегии даже блестящая тактика ведёт не туда.' },
      { n:'Гл. 6', t:'Управление своими ресурсами',
        s:'Время, энергия и внимание — главные невосполнимые ресурсы. Технология правильного распределения: концентрация на задачах, создающих максимальную ценность, и жёсткий, осознанный отказ от второстепенного. Тарасов показывает, как расставлять приоритеты так, чтобы не растрачивать себя на чужие цели и чужие проблемы.',
        k:'Защищай своё время и внимание так же жёстко, как защищаешь деньги.' },
      { n:'Гл. 7', t:'Путь к большой цели',
        s:'Путь к большой цели состоит из малых, точно выверенных шагов в условиях неполной информации. Тарасов описывает технику последовательного сужения неопределённости: как двигаться вперёд, даже когда полная картина ещё не ясна, — доверяя принципам и корректируя курс по мере прояснения ситуации.',
        k:'Двигайся к цели маленькими шагами в условиях неопределённости — карта появляется в пути.' },
    ]
  },

  {
    id: 'japanese-koans', category: 'mgmt',
    title: 'Русские уроки японских коанов', author: 'Владимир Тарасов',
    tagline: 'Управленческая мудрость сквозь призму японских притч.',
    emoji: '🎋',
    grad: 'linear-gradient(135deg, #fb7185 0%, #e11d48 50%, #9f1239 100%)',
    insight: 'Коан — история-загадка без единственно правильного ответа. Японские мастера использовали их для развития нестандартного мышления. Тарасов адаптирует эту традицию для российской управленческой культуры.',
    chapters: [
      { n:'Гл. 1', t:'Зачем менеджеру коан',
        s:'Коан — это история или вопрос, у которого нет одного правильного ответа. Японские менеджеры и мастера дзен использовали коаны для выхода за рамки привычного мышления. Тарасов объясняет, почему этот инструмент особенно ценен для руководителей: управленческие ситуации редко имеют однозначное решение, и умение видеть несколько слоёв смысла — ключевой навык.',
        k:'Управленческие ситуации, как коаны, требуют выхода за рамки привычных категорий.' },
      { n:'Гл. 2', t:'Власть и ответственность',
        s:'Серия коанов о природе власти. Кто по-настоящему управляет ситуацией — тот, у кого формальный авторитет, или тот, кто точнее понимает реальность? Тарасов через притчи показывает: настоящая власть — это когда люди следуют за тобой без принуждения, потому что видят в тебе того, кто видит дальше и понимает глубже.',
        k:'Настоящая власть — это когда за тобой следуют без принуждения, потому что доверяют твоему видению.' },
      { n:'Гл. 3', t:'Решения в условиях неопределённости',
        s:'Коаны о принятии решений при неполной информации. Японская управленческая мудрость гласит: лучшее решение — то, которое принято и исполнено, а не идеальное, которое никогда не было реализовано. Тарасов применяет этот принцип к российской деловой практике, где медлительность и перфекционизм часто стоят дороже, чем ошибка.',

// ── State ──────────────────────────────────────────────────
let activeFilter = 'all';

function filter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.tab').forEach(b => { b.className = 'tab'; });
  const cls = { all: 'on-all', habits: 'on-habits', health: 'on-health', comm: 'on-comm', dev: 'on-dev', mgmt: 'on-mgmt', culture: 'on-culture' };
  btn.className = `tab ${cls[cat]}`;
  render();
}

// ── Render ─────────────────────────────────────────────────
function render() {
  const habits = BOOKS.filter(b => b.category === 'habits');
  const health = BOOKS.filter(b => b.category === 'health');
  const comm   = BOOKS.filter(b => b.category === 'comm');
  const dev    = BOOKS.filter(b => b.category === 'dev');
  const mgmt    = BOOKS.filter(b => b.category === 'mgmt');
  const culture = BOOKS.filter(b => b.category === 'culture');
  const showHa  = activeFilter === 'all' || activeFilter === 'habits';
  const showHe  = activeFilter === 'all' || activeFilter === 'health';
  const showCo  = activeFilter === 'all' || activeFilter === 'comm';
  const showDe  = activeFilter === 'all' || activeFilter === 'dev';
  const showMg  = activeFilter === 'all' || activeFilter === 'mgmt';
  const showCu  = activeFilter === 'all' || activeFilter === 'culture';

  const visible = BOOKS.filter(b => activeFilter === 'all' || b.category === activeFilter);
  const totalCh = visible.reduce((s, b) => s + b.chapters.length, 0);
  document.getElementById('count-label').innerHTML =
    `Showing <strong>${visible.length} books</strong> · ${totalCh} chapters`;

  let html = '';
  if (showHa) html += section('habits', '⚡', 'Habits', habits);
  if (showHe) html += section('health', '🌿', 'Health', health);
  if (showCo) html += section('comm',   '🗣️', 'Communication', comm);
  if (showDe) html += section('dev',    '🚀', 'Development', dev);
  if (showMg) html += section('mgmt',    '⚔️', 'Management', mgmt);
  if (showCu) html += section('culture', '🌐', 'Culture',    culture);
  document.getElementById('main').innerHTML = html;
}

function section(cat, emoji, label, books) {
  return `
    <div class="section-header">
      <div class="section-icon ${cat}">${emoji}</div>
      <span class="section-title ${cat}">${label}</span>
      <div class="section-line"></div>
      <span class="section-count">${books.length} books</span>
    </div>
    <div class="books-grid">${books.map(card).join('')}</div>
  `;
}

function card(b) {
  const accentMap = { habits: 'var(--habits)', health: 'var(--health)', comm: 'var(--comm)', dev: 'var(--dev)', mgmt: 'var(--mgmt)', culture: 'var(--culture)' };
  const accent = accentMap[b.category] || 'var(--blue)';
  return `
    <div class="book-card" style="--card-accent:${accent}" onclick="openBook('${b.id}')">
      <div class="book-spine"></div>
      <div class="book-cover" style="background:${b.grad}">
        <div class="book-cover-icon">${b.emoji}</div>
        <p class="book-cover-title">${b.title}</p>
      </div>
      <div class="book-body">
        <p class="book-author">${b.author}</p>
        <p class="book-tagline">${b.tagline}</p>
        <div class="book-footer">
          <span class="book-chapters">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            ${b.chapters.length} chapters
          </span>
          <span class="read-btn">Read ›</span>
        </div>
      </div>
    </div>
  `;
}

// ── Modal ──────────────────────────────────────────────────
function openBook(id) {
  const b = BOOKS.find(x => x.id === id);
  if (!b) return;
  const accentMap = { habits: 'var(--habits)', health: 'var(--health)', comm: 'var(--comm)', dev: 'var(--dev)', mgmt: 'var(--mgmt)', culture: 'var(--culture)' };
  const accent = accentMap[b.category] || 'var(--blue)';
  const bgMap  = { habits: 'rgba(245,158,11,.07)',  health: 'rgba(16,185,129,.07)',  comm: 'rgba(167,139,250,.07)',  dev: 'rgba(14,165,233,.07)',  mgmt: 'rgba(225,29,72,.07)',  culture: 'rgba(45,212,191,.07)' };
  const bdMap  = { habits: 'rgba(245,158,11,.25)',  health: 'rgba(16,185,129,.25)',  comm: 'rgba(167,139,250,.25)',  dev: 'rgba(14,165,233,.25)',  mgmt: 'rgba(225,29,72,.25)',  culture: 'rgba(45,212,191,.25)' };
  const insightBg     = bgMap[b.category]  || 'rgba(59,130,246,.07)';
  const insightBorder = bdMap[b.category]  || 'rgba(59,130,246,.25)';

  document.getElementById('modal').style.setProperty('--card-accent', accent);

  document.getElementById('modal-banner-bg').style.background = b.grad;
  document.getElementById('modal-banner-content').innerHTML = `
    <div class="modal-book-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <div class="modal-banner-text">
      <h2>${b.title}</h2>
      <p class="modal-author">${b.author}</p>
    </div>
  `;

  document.getElementById('modal-meta').innerHTML = `
    <span class="cat-badge ${b.category}">${b.emoji} ${b.category}</span>
    <span class="modal-tagline">"${b.tagline}"</span>
    <span class="modal-chapter-count">${b.chapters.length} chapters</span>
  `;

  document.getElementById('modal-insight').innerHTML = `
    <div class="insight-card" style="background:${insightBg};border-color:${insightBorder}">
      <p class="insight-label" style="color:${accent === 'var(--habits)' ? 'var(--habits)' : 'var(--health)'}">Core insight</p>
      <p class="insight-text">${b.insight}</p>
    </div>
  `;

  document.getElementById('modal-chapters').innerHTML = b.chapters.map((ch, i) => `
    <div class="acc" id="acc-${i}">
      <button class="acc-trigger" onclick="toggle(${i})">
        <span class="ch-badge">${ch.n}</span>
        <span class="acc-title">${ch.t}</span>
        <span class="acc-arrow">▾</span>
      </button>
      <div class="acc-body" id="body-${i}">
        <div class="acc-inner">
          ${ch.s}
          <div class="takeaway">
            <span class="takeaway-icon">✦</span>
            <div class="takeaway-text">
              <strong>Key takeaway</strong>
              ${ch.k}
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('overlay').scrollTop = 0;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function toggle(i) {
  const item = document.getElementById(`acc-${i}`);
  const body = document.getElementById(`body-${i}`);
  const wasOpen = item.classList.contains('is-open');

  document.querySelectorAll('.acc').forEach(a => a.classList.remove('is-open'));
  document.querySelectorAll('.acc-body').forEach(b => b.classList.remove('open'));

  if (!wasOpen) {
    item.classList.add('is-open');
    body.classList.add('open');
    setTimeout(() => body.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
